syntax = "proto3";
package auth;

import "buf/validate/validate.proto";

enum ErrorCode {
    UNSPECIFIED              = 0;
    OK                       = 1;
    UNKNOWN_CREDENTIAL       = 2;
    WRONG_PASSWORD           = 3;
    INVALID_METHOD           = 4;
    INVALID_SERVER_SIGNATURE = 5;
    CHALLENGE_EXPIRED        = 6;
    INVALID_CLIENT_SIGNATURE = 7;
    INVALID_PUBLIC_DATA_KEY  = 8;
    INVALID_PUBLIC_CHALLENGE_KEY = 9;
}

message ErrorResponse {
    ErrorCode error_code = 1;
    optional string message = 2;
}

// Register

message RegisterRequest {

    message RegisterKeyMaterial {
      bytes encrypted_master_key = 1                [(buf.validate.field).bytes.len = 48];  // box.secretKeyLength(32) + secretbox.overheadLength(16)
      bytes encrypted_master_key_nonce = 2          [(buf.validate.field).bytes.len = 24];  // secretbox.nonceLength
    
      bytes public_sign_key = 3                     [(buf.validate.field).bytes.len = 32];  // sign.publicKeyLength
      bytes encrypted_private_sign_key = 4          [(buf.validate.field).bytes.len = 80];  // sign.secretKeyLength(64) + secretbox.overheadLength(16)
      bytes encrypted_private_sign_key_nonce = 5    [(buf.validate.field).bytes.len = 24];
    
      bytes public_data_key = 6                     [(buf.validate.field).bytes.len = 32];
      bytes encrypted_private_data_key = 7          [(buf.validate.field).bytes.len = 48];  // box.secretKeyLength(32) + secretbox.overheadLength(16)
      bytes encrypted_private_data_key_nonce = 8    [(buf.validate.field).bytes.len = 24];
    
      bytes group_public_key = 9                    [(buf.validate.field).bytes.len = 32];
      bytes group_encrypted_private_key = 10        [(buf.validate.field).bytes.len = 80];  // box.secretKeyLength(32) + box.overheadLength(16) + NACL_EPHEMERAL_BOX_OVERHEAD
    
      bytes collection_public_key = 11              [(buf.validate.field).bytes.len = 32];
      bytes collection_encrypted_private_key = 12   [(buf.validate.field).bytes.len = 80];  // box.secretKeyLength(32) + box.overheadLength(16) + NACL_EPHEMERAL_BOX_OVERHEAD
    }

    message PublicKeyRegisterRequest {
        string identifier = 1                     [(buf.validate.field).string.min_len = 1];
        bytes public_key = 2                      [(buf.validate.field).bytes.len = 32]; // sign.publicKeyLength
        bytes client_server_signed_challenge = 3  [(buf.validate.field).bytes.min_len = 16, (buf.validate.field).bytes.max_len = 128];
        RegisterKeyMaterial keys = 4              [(buf.validate.field).required = true];
    }
    
    message PasswordRegisterRequest {
        string identifier = 1           [(buf.validate.field).string.min_len = 1];
        bytes password = 2              [(buf.validate.field).bytes.len = 32];
        RegisterKeyMaterial keys = 3    [(buf.validate.field).required = true];
    }

    oneof method {
        option (buf.validate.oneof).required = true;
        PublicKeyRegisterRequest public_key = 1;
        PasswordRegisterRequest  password   = 2;
    }
}

message RegisterResponse {
    message RegisterOkResponse {
        string token = 1;   
    }

    oneof response {
        ErrorResponse error = 1;
        RegisterOkResponse ok = 2;
    }
}

// GetChallenge

message GetChallengeRequest {

}

message GetChallengeResponse {
    message GetChallengeOkResponse {
        bytes server_signed_challenge = 1;
    }

    oneof response {
        ErrorResponse error = 1;
        GetChallengeOkResponse ok = 2;
    }
}

// Login

message LoginRequest {
    message PublicKeyLoginRequest {
        string identifier = 1                         [(buf.validate.field).string.min_len = 8, (buf.validate.field).string.max_len = 64];
        bytes client_server_signed_challenge = 2      [(buf.validate.field).bytes.min_len = 16, (buf.validate.field).bytes.max_len = 128];
    }
    
    message PasswordLoginRequest {
        string identifier = 1         [(buf.validate.field).string.min_len = 8, (buf.validate.field).string.max_len = 64];
        bytes password = 2            [(buf.validate.field).bytes.len = 32];
    }

    oneof method {
        option (buf.validate.oneof).required = true;
        PublicKeyLoginRequest public_key = 1;
        PasswordLoginRequest  password   = 2;
    }
}

message LoginResponse {
    message LoginResponseOkData {
        string token = 1;
        
        bytes encrypted_master_key       = 2;
        bytes encrypted_master_key_nonce = 3;
        
        // All private keys encrypted with master key
        bytes public_sign_key                  = 4;
        bytes encrypted_private_sign_key       = 5;
        bytes encrypted_private_sign_key_nonce = 6;
        bytes public_data_key                  = 7;
        bytes encrypted_private_data_key       = 8;
        bytes encrypted_private_data_key_nonce = 9;
    }

    oneof response {
        ErrorResponse error = 1;
        LoginResponseOkData ok = 2;
    }
}

message GetCollectionRequest {
    uint64 id = 1;
}

message GetCollectionResponse {
    message GetCollectionOkResponse {

    }    
}

message GetObjectRequest {
    uint64 id = 1;
}

message GetObjectResponse {
    
}